<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setup Admin - KheZwo Lite</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 30px;
      padding: 40px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    p { color: #666; margin-bottom: 20px; }
    input { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 12px; margin-bottom: 15px; }
    .btn { width: 100%; padding: 14px; background: #1a1a2e; color: white; border: none; border-radius: 16px; cursor: pointer; }
    .success { color: #2e7d32; background: #e8f5e9; padding: 10px; border-radius: 10px; margin-bottom: 15px; display: none; }
    .error { color: #c33; background: #fee; padding: 10px; border-radius: 10px; margin-bottom: 15px; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔐 Setup Admin</h1>
    <p>Create your admin account</p>
    <div id="success" class="success"></div>
    <div id="error" class="error"></div>
    <form id="setupForm">
      <input type="text" id="username" placeholder="Username" value="admin" required>
      <input type="password" id="password" placeholder="Password" value="admin123" required>
      <input type="password" id="confirm" placeholder="Confirm Password" value="admin123" required>
      <button type="submit" class="btn">Create Admin Account</button>
    </form>
    <p style="margin-top: 20px;"><a href="/admin-login.html">← Back to Login</a></p>
  </div>
  <script>
    document.getElementById('setupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      
      document.getElementById('error').style.display = 'none';
      document.getElementById('success').style.display = 'none';
      
      if (password !== confirm) {
        document.getElementById('error').textContent = 'Passwords do not match';
        document.getElementById('error').style.display = 'block';
        return;
      }
      
      if (password.length < 6) {
        document.getElementById('error').textContent = 'Password must be at least 6 characters';
        document.getElementById('error').style.display = 'block';
        return;
      }
      
      const res = await fetch('/api/setup-admin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      
      const data = await res.json();
      
      if (res.ok) {
        document.getElementById('success').textContent = 'Admin created! Redirecting...';
        document.getElementById('success').style.display = 'block';
        setTimeout(() => window.location.href = '/admin-login.html', 2000);
      } else {
        document.getElementById('error').textContent = data.error || 'Failed';
        document.getElementById('error').style.display = 'block';
      }
    });
  </script>
</body>
</html>
