<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - KheZwo Lite</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 30px;
      padding: 40px;
      max-width: 450px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    h1 { font-size: 24px; margin-bottom: 8px; color: #1a1a2e; }
    .subtitle { color: #666; font-size: 14px; margin-bottom: 25px; }
    label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; }
    input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 16px;
      margin-bottom: 15px;
      transition: border 0.3s;
    }
    input:focus { outline: none; border-color: #667eea; }
    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .error { color: #c33; background: #fee; padding: 10px; border-radius: 10px; margin-bottom: 15px; display: none; }
    .success { color: #2e7d32; background: #e8f5e9; padding: 10px; border-radius: 10px; margin-bottom: 15px; display: none; }
    .login-link { text-align: center; margin-top: 20px; font-size: 14px; color: #666; }
    .login-link a { color: #667eea; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Join KheZwo Lite</h1>
    <div class="subtitle">Start taking QR orders in 2 minutes</div>
    <div id="error" class="error"></div>
    <div id="success" class="success"></div>
    <form id="signupForm">
      <label>Business Name</label>
      <input type="text" id="businessName" placeholder="e.g., My Cafe" required>
      <label>Owner Name</label>
      <input type="text" id="ownerName" placeholder="Your full name" required>
      <label>Email</label>
      <input type="email" id="email" placeholder="you@business.com" required>
      <label>Phone</label>
      <input type="tel" id="phone" placeholder="0712345678" required>
      <label>Password</label>
      <input type="password" id="password" placeholder="At least 6 characters" required>
      <label>Confirm Password</label>
      <input type="password" id="confirmPassword" placeholder="Type again" required>
      <button type="submit" class="btn">Create Account →</button>
    </form>
    <div class="login-link">Already have an account? <a href="/vendor-login.html">Login</a></div>
  </div>
  <script>
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const error = document.getElementById('error');
      const success = document.getElementById('success');
      error.style.display = 'none';
      success.style.display = 'none';
      
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;
      
      if (password !== confirm) {
        error.textContent = 'Passwords do not match';
        error.style.display = 'block';
        return;
      }
      if (password.length < 6) {
        error.textContent = 'Password must be at least 6 characters';
        error.style.display = 'block';
        return;
      }
      
      const btn = document.querySelector('.btn');
      btn.disabled = true;
      btn.textContent = 'Creating...';
      
      const res = await fetch('/api/vendor/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          business_name: document.getElementById('businessName').value,
          owner_name: document.getElementById('ownerName').value,
          email: document.getElementById('email').value,
          phone: document.getElementById('phone').value,
          password: password
        })
      });
      
      const data = await res.json();
      if (res.ok) {
        success.textContent = 'Account created! Redirecting to login...';
        success.style.display = 'block';
        setTimeout(() => window.location.href = '/vendor-login.html', 2000);
      } else {
        error.textContent = data.error || 'Signup failed';
        error.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Create Account →';
      }
    });
  </script>
</body>
</html>
