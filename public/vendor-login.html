<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - KheZwo Lite</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 30px;
      padding: 40px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    h1 { font-size: 24px; margin-bottom: 8px; color: #1a1a2e; }
    .subtitle { color: #666; font-size: 14px; margin-bottom: 25px; }
    input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 16px;
      margin-bottom: 15px;
    }
    input:focus { outline: none; border-color: #667eea; }
    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .error { color: #c33; background: #fee; padding: 10px; border-radius: 10px; margin-bottom: 15px; display: none; }
    .links { text-align: center; margin-top: 20px; font-size: 14px; color: #666; }
    .links a { color: #667eea; text-decoration: none; }
    .demo {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 12px;
      margin-top: 20px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Welcome Back</h1>
    <div class="subtitle">Login to your dashboard</div>
    <div id="error" class="error"></div>
    <form id="loginForm">
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit" class="btn">Login →</button>
    </form>
    <div class="links">
      <a href="/forgot-password.html">Forgot password?</a> · <a href="/vendor-signup.html">Sign up</a>
    </div>
    <div class="demo">
      <strong>Demo:</strong> demo@cafe.com / demo123
    </div>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const error = document.getElementById('error');
      error.style.display = 'none';
      
      const res = await fetch('/api/vendor/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        })
      });
      
      const data = await res.json();
      if (res.ok && data.success) {
        window.location.href = data.redirect;
      } else {
        error.textContent = data.error || 'Login failed';
        error.style.display = 'block';
      }
    });
  </script>
</body>
</html>
