<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - KheZwo Lite</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
    }
    .header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { font-size: 20px; }
    .header .logout { background: rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 10px; text-decoration: none; color: white; }
    .tab-bar {
      background: white;
      display: flex;
      padding: 0 20px;
      border-bottom: 1px solid #e0e0e0;
      overflow-x: auto;
    }
    .tab {
      padding: 15px 20px;
      border: none;
      background: none;
      font-weight: 600;
      color: #666;
      cursor: pointer;
      font-size: 14px;
      white-space: nowrap;
    }
    .tab.active { color: #667eea; border-bottom: 3px solid #667eea; }
    .content { padding: 20px; max-width: 800px; margin: 0 auto; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    /* Cards */
    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .card h2 { font-size: 18px; margin-bottom: 15px; }
    
    /* Orders */
    .order {
      border-left: 4px solid #667eea;
      padding: 15px;
      background: #f9f9f9;
      border-radius: 12px;
      margin-bottom: 12px;
    }
    .order .number { font-weight: 700; color: #667eea; }
    .order .items { margin: 8px 0; font-size: 14px; color: #555; }
    .order .total { font-weight: 700; }
    .complete-btn {
      background: #4caf50;
      color: white;
      border: none;
      padding: 6px 16px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 8px;
    }
    
    /* Menu items */
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 15px;
    }
    .menu-item {
      background: white;
      border-radius: 12px;
      padding: 15px;
      text-align: center;
      border: 1px solid #e0e0e0;
    }
    .menu-item img { width: 80px; height: 80px; border-radius: 10px; object-fit: cover; margin-bottom: 10px; }
    .menu-item .name { font-weight: 600; }
    .menu-item .price { color: #667eea; font-weight: 700; }
    .menu-item .status { font-size: 11px; color: #999; }
    
    /* Forms */
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 14px; }
    .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 10px; }
    .btn {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-secondary { background: #e0e0e0; color: #333; }
    
    /* QR Code */
    .qr-container { text-align: center; padding: 20px; }
    .qr-container img { max-width: 200px; border-radius: 16px; }
    
    .empty-state { text-align: center; padding: 40px; color: #999; }
    .empty-state .icon { font-size: 48px; margin-bottom: 15px; }
    
    @media (max-width: 480px) {
      .menu-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>KheZwo Lite</h1>
    <div><span id="businessName">Loading...</span> <a href="/api/vendor/logout" class="logout">Logout</a></div>
  </div>
  
  <div class="tab-bar">
    <button class="tab active" data-tab="orders">📋 Orders</button>
    <button class="tab" data-tab="menu">🍽️ Menu</button>
    <button class="tab" data-tab="history">📜 History</button>
    <button class="tab" data-tab="profile">⚙️ Profile</button>
    <button class="tab" data-tab="qr">📱 QR Code</button>
  </div>
  
  <div class="content">
    <!-- Orders Tab -->
    <div id="orders-tab" class="tab-content active">
      <div class="card">
        <h2>Live Orders</h2>
        <div id="ordersList"><div class="empty-state"><div class="icon">🛒</div>No pending orders</div></div>
      </div>
    </div>
    
    <!-- Menu Tab -->
    <div id="menu-tab" class="tab-content">
      <div class="card">
        <h2>Add Menu Item</h2>
        <form id="addItemForm" enctype="multipart/form-data">
          <div class="form-group"><label>Item Name</label><input type="text" id="itemName" required></div>
          <div class="form-group"><label>Price (R)</label><input type="number" id="itemPrice" step="0.01" required></div>
          <div class="form-group"><label>Description</label><textarea id="itemDesc" rows="2"></textarea></div>
          <div class="form-group"><label>Photo</label><input type="file" id="itemPhoto" accept="image/*"></div>
          <button type="submit" class="btn">Add Item</button>
        </form>
      </div>
      <div class="card">
        <h2>Your Menu</h2>
        <div id="menuList" class="menu-grid"><div class="empty-state">No items yet</div></div>
      </div>
    </div>
    
    <!-- History Tab -->
    <div id="history-tab" class="tab-content">
      <div class="card">
        <h2>Order History</h2>
        <div id="historyList"><div class="empty-state"><div class="icon">📜</div>No completed orders</div></div>
      </div>
    </div>
    
    <!-- Profile Tab -->
    <div id="profile-tab" class="tab-content">
      <div class="card">
        <h2>Business Profile</h2>
        <form id="profileForm" enctype="multipart/form-data">
          <div class="form-group"><label>Business Name</label><input type="text" id="profileName"></div>
          <div class="form-group"><label>Owner Name</label><input type="text" id="profileOwner"></div>
          <div class="form-group"><label>Phone</label><input type="text" id="profilePhone"></div>
          <div class="form-group"><label>Logo</label><input type="file" id="profileLogo" accept="image/*"></div>
          <button type="submit" class="btn">Save Profile</button>
        </form>
      </div>
    </div>
    
    <!-- QR Tab -->
    <div id="qr-tab" class="tab-content">
      <div class="card">
        <h2>Your QR Code</h2>
        <p>Print and display for customers.</p>
        <div class="qr-container" id="qrContainer">Loading...</div>
        <button onclick="downloadQR()" class="btn">Download QR</button>
        <button onclick="regenerateQR()" class="btn btn-secondary" style="margin-left:10px;">Regenerate</button>
      </div>
    </div>
  </div>
  
  <script>
    let vendorData = null;
    let menuItems = [];
    let orders = [];
    
    async function loadData() {
      const res = await fetch('/api/vendor/data');
      const data = await res.json();
      if (res.ok) {
        vendorData = data.vendor;
        menuItems = data.menu_items || [];
        orders = data.orders || [];
        document.getElementById('businessName').textContent = vendorData.business_name || 'Business';
        document.getElementById('profileName').value = vendorData.business_name || '';
        document.getElementById('profileOwner').value = vendorData.owner_name || '';
        document.getElementById('profilePhone').value = vendorData.phone || '';
        renderOrders();
        renderMenu();
        loadHistory();
        loadQR();
      }
    }
    
    function renderOrders() {
      const container = document.getElementById('ordersList');
      if (!orders || !orders.length) {
        container.innerHTML = '<div class="empty-state"><div class="icon">🛒</div>No pending orders</div>';
        return;
      }
      container.innerHTML = orders.map(order => {
        const items = JSON.parse(order.items_json);
        return `
          <div class="order">
            <div class="number">Order #${order.order_number}</div>
            <div><strong>${order.customer_name || 'Anonymous'}</strong> · ${new Date(order.created_at).toLocaleString()}</div>
            <div class="items">${items.map(i => `${i.name} x${i.quantity}`).join(', ')}</div>
            <div class="total">R${parseFloat(order.total).toFixed(2)}</div>
            <button class="complete-btn" onclick="completeOrder(${order.id})">Mark Complete</button>
          </div>
        `;
      }).join('');
    }
    
    function renderMenu() {
      const container = document.getElementById('menuList');
      if (!menuItems || !menuItems.length) {
        container.innerHTML = '<div class="empty-state">No items yet</div>';
        return;
      }
      container.innerHTML = menuItems.map(item => `
        <div class="menu-item">
          ${item.photo_url ? `<img src="${item.photo_url}">` : '<div style="font-size:40px; padding:20px;">🍽️</div>'}
          <div class="name">${item.name}</div>
          <div class="price">R${parseFloat(item.price).toFixed(2)}</div>
          <div class="status">${item.is_available ? '✅ Available' : '❌ Unavailable'}</div>
          <button onclick="toggleItem(${item.id}, ${item.is_available})" style="margin-top:8px; font-size:11px; padding:4px 12px; border-radius:8px; border:1px solid #667eea; background:white; color:#667eea; cursor:pointer;">
            ${item.is_available ? 'Out of Stock' : 'Restock'}
          </button>
        </div>
      `).join('');
    }
    
    async function toggleItem(id, current) {
      const res = await fetch('/api/vendor/toggle-availability', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ item_id: id, is_available: current ? 0 : 1 })
      });
      if (res.ok) loadData();
    }
    
    async function completeOrder(orderId) {
      const res = await fetch('/api/vendor/update-order-status', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ order_id: orderId, status: 'completed' })
      });
      if (res.ok) loadData();
    }
    
    async function loadHistory() {
      const res = await fetch('/api/vendor/order-history');
      const history = await res.json();
      const container = document.getElementById('historyList');
      if (!history || !history.length) {
        container.innerHTML = '<div class="empty-state"><div class="icon">📜</div>No completed orders</div>';
        return;
      }
      container.innerHTML = history.map(order => {
        const items = JSON.parse(order.items_json);
        return `
          <div class="order" style="border-left-color: #999;">
            <div class="number">Order #${order.order_number}</div>
            <div>${order.customer_name || 'Anonymous'} · ${new Date(order.created_at).toLocaleString()}</div>
            <div class="items">${items.map(i => `${i.name} x${i.quantity}`).join(', ')}</div>
            <div class="total">R${parseFloat(order.total).toFixed(2)}</div>
          </div>
        `;
      }).join('');
    }
    
    async function loadQR() {
      const res = await fetch('/api/vendor/qr-code');
      const data = await res.json();
      if (data.success) {
        document.getElementById('qrContainer').innerHTML = `<img id="qrImg" src="${data.qrBase64}">`;
      }
    }
    
    async function regenerateQR() {
      const res = await fetch('/api/vendor/regenerate-qr');
      if (res.ok) loadQR();
    }
    
    function downloadQR() {
      const img = document.getElementById('qrImg');
      if (img) {
        const link = document.createElement('a');
        link.download = 'qrcode.png';
        link.href = img.src;
        link.click();
      }
    }
    
    document.getElementById('addItemForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData();
      fd.append('name', document.getElementById('itemName').value);
      fd.append('price', document.getElementById('itemPrice').value);
      fd.append('description', document.getElementById('itemDesc').value);
      const photo = document.getElementById('itemPhoto').files[0];
      if (photo) fd.append('photo', photo);
      await fetch('/api/vendor/add-menu-item', { method: 'POST', body: fd });
      document.getElementById('addItemForm').reset();
      loadData();
    });
    
    document.getElementById('profileForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData();
      fd.append('business_name', document.getElementById('profileName').value);
      fd.append('owner_name', document.getElementById('profileOwner').value);
      fd.append('phone', document.getElementById('profilePhone').value);
      const logo = document.getElementById('profileLogo').files[0];
      if (logo) fd.append('logo', logo);
      await fetch('/api/vendor/update-profile', { method: 'POST', body: fd });
      loadData();
    });
    
    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab + '-tab').classList.add('active');
        if (tab.dataset.tab === 'history') loadHistory();
        if (tab.dataset.tab === 'qr') loadQR();
      });
    });
    
    loadData();
    // Auto-refresh orders every 10 seconds
    setInterval(() => {
      if (document.querySelector('.tab.active').dataset.tab === 'orders') loadData();
    }, 10000);
  </script>
</body>
</html>
