<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - KheZwo Lite</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        h1 { font-size: 32px; margin-bottom: 10px; color: #1a1a2e; }
        .subtitle { color: #666; margin-bottom: 30px; }
        .contact-info { background: #f8f9fa; padding: 20px; border-radius: 20px; margin: 20px 0; }
        .contact-item { display: flex; align-items: center; gap: 15px; padding: 12px 0; border-bottom: 1px solid #e0e0e0; }
        .contact-item:last-child { border-bottom: none; }
        .contact-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }
        .feedback-form textarea { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 14px; resize: vertical; margin: 10px 0; }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        .back-btn { display: inline-block; margin-top: 20px; color: #667eea; text-decoration: none; }
        .success { color: #2e7d32; background: #e8f5e9; padding: 12px; border-radius: 12px; display: none; margin-bottom: 15px; }
        .error { color: #c33; background: #fee; padding: 12px; border-radius: 12px; display: none; margin-bottom: 15px; }
        .stars { font-size: 30px; cursor: pointer; margin: 10px 0; }
        .stars span { color: #ddd; transition: color 0.2s; }
        .stars span.active { color: #ffc107; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📬 Contact Us</h1>
            <div class="subtitle">We'd love to hear from you</div>
            
            <div class="contact-info">
                <div class="contact-item">
                    <div class="contact-icon"><i class="fas fa-envelope"></i></div>
                    <div><strong>Email</strong><br><a href="mailto:khezwotech@gmail.com">khezwotech@gmail.com</a></div>
                </div>
                <div class="contact-item">
                    <div class="contact-icon"><i class="fas fa-phone"></i></div>
                    <div><strong>Phone</strong><br><a href="tel:+27627745440">062 774 5440</a></div>
                </div>
            </div>
            
            <h2 style="margin-top: 30px; font-size: 20px;">✉️ Send Feedback</h2>
            <p style="color: #666; margin-bottom: 15px;">Help us improve KheZwo Lite</p>
            
            <div id="successMsg" class="success">✅ Thank you! Your feedback has been sent.</div>
            <div id="errorMsg" class="error">❌ Failed to send feedback. Please try again.</div>
            
            <form id="feedbackForm" class="feedback-form">
                <div class="stars" id="starRating">
                    <span data-value="1">★</span>
                    <span data-value="2">★</span>
                    <span data-value="3">★</span>
                    <span data-value="4">★</span>
                    <span data-value="5">★</span>
                </div>
                <input type="hidden" id="rating" value="5">
                <input type="text" id="customerName" placeholder="Your name (optional)" style="width:100%; padding:12px; border:2px solid #e0e0e0; border-radius:12px; margin:10px 0;">
                <input type="email" id="customerEmail" placeholder="Your email (optional)" style="width:100%; padding:12px; border:2px solid #e0e0e0; border-radius:12px; margin:10px 0;">
                <textarea id="feedbackMessage" rows="4" placeholder="Your feedback, suggestions, or issue..." required></textarea>
                <button type="submit" class="btn">Send Feedback</button>
            </form>
            
            <a href="/" class="back-btn">← Back to Home</a>
        </div>
    </div>
    <script>
        // Star rating
        document.querySelectorAll('#starRating span').forEach(star => {
            star.addEventListener('click', function() {
                const value = parseInt(this.dataset.value);
                document.querySelectorAll('#starRating span').forEach(s => {
                    s.classList.toggle('active', parseInt(s.dataset.value) <= value);
                });
                document.getElementById('rating').value = value;
            });
        });
        // Set initial rating to 5
        document.querySelector('#starRating span[data-value="5"]')?.classList.add('active');
        
        document.getElementById('feedbackForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const message = document.getElementById('feedbackMessage').value;
            if (!message) {
                alert('Please enter your feedback');
                return;
            }
            
            const formData = {
                customer_name: document.getElementById('customerName').value,
                customer_email: document.getElementById('customerEmail').value,
                message: message,
                rating: parseInt(document.getElementById('rating').value)
            };
            
            try {
                const res = await fetch('/api/feedback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                const data = await res.json();
                if (res.ok) {
                    document.getElementById('successMsg').style.display = 'block';
                    document.getElementById('feedbackForm').reset();
                    document.getElementById('rating').value = 5;
                    document.querySelectorAll('#starRating span').forEach((s, i) => {
                        s.classList.toggle('active', i >= 4);
                    });
                } else {
                    document.getElementById('errorMsg').style.display = 'block';
                }
            } catch (err) {
                document.getElementById('errorMsg').style.display = 'block';
            }
        });
    </script>
</body>
</html>
