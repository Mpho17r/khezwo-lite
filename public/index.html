<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KheZwo Lite - QR Code Ordering</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 30px;
      padding: 40px;
      max-width: 450px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .logo {
      font-size: 48px;
      font-weight: 800;
      color: #667eea;
      margin-bottom: 10px;
    }
    .logo span { color: #764ba2; }
    .subtitle {
      color: #666;
      font-size: 16px;
      margin-bottom: 30px;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      margin-bottom: 12px;
      transition: transform 0.2s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
    .btn-secondary { background: #f5f5f5; color: #333; }
    .btn-outline { background: transparent; color: #667eea; border: 2px solid #667eea; }
    .small { font-size: 13px; color: #999; margin-top: 20px; }
    .small a { color: #667eea; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">KheZwo<span>Lite</span></div>
    <div class="subtitle">QR Code Ordering — Made Simple</div>
    <a href="/vendor-signup.html" class="btn btn-primary">Start Your Business →</a>
    <a href="/vendor-login.html" class="btn btn-secondary">Vendor Login</a>
    <a href="/admin-login.html" class="btn btn-outline">Admin Login</a>
    <div class="small">
      <p>Free to start. No setup fee.</p>
      <p style="margin-top:5px;"><a href="/privacy.html">Privacy</a> · <a href="/terms.html">Terms</a></p>
    </div>
  </div>
</body>
</html>
